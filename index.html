<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Yahtzee Scoreboard</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0e0c;
    --surface: #1a1916;
    --surface2: #252320;
    --border: #333128;
    --accent: #f5c842;
    --accent2: #e8743a;
    --red: #e84040;
    --green: #4caf6e;
    --text: #f0ead8;
    --muted: #7a7060;
    --upper: #2a2316;
    --lower: #16201a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    padding-bottom: 80px;
  }

  /* HEADER */
  header {
    background: var(--surface);
    border-bottom: 2px solid var(--accent);
    padding: 14px 16px 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    letter-spacing: 2px;
    color: var(--accent);
    line-height: 1;
    flex-shrink: 0;
  }

  .logo span { color: var(--accent2); }

  .header-btns {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: flex-end;
  }

  .btn {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    font-weight: 500;
    padding: 6px 12px;
    border-radius: 4px;
    border: 1.5px solid var(--border);
    background: transparent;
    color: var(--text);
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn.primary { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 500; }
  .btn.primary:hover { background: #e0b530; }
  .btn.danger { border-color: var(--red); color: var(--red); }
  .btn.danger:hover { background: var(--red); color: #fff; }

  /* PLAYER SETUP */
  #setup-screen {
    padding: 24px 16px;
    max-width: 500px;
    margin: 0 auto;
  }

  #setup-screen h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.5rem;
    letter-spacing: 1px;
    color: var(--accent);
    margin-bottom: 20px;
  }

  .player-input-row {
    display: flex;
    gap: 8px;
    margin-bottom: 10px;
    align-items: center;
  }

  .player-color-dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  input[type="text"] {
    flex: 1;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.85rem;
    padding: 10px 12px;
    outline: none;
    transition: border-color 0.15s;
  }

  input[type="text"]:focus { border-color: var(--accent); }
  input[type="text"]::placeholder { color: var(--muted); }

  .remove-player-btn {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 1.1rem;
    cursor: pointer;
    padding: 4px 8px;
    transition: color 0.15s;
    flex-shrink: 0;
  }

  .remove-player-btn:hover { color: var(--red); }

  .setup-actions {
    display: flex;
    gap: 10px;
    margin-top: 20px;
    flex-wrap: wrap;
  }

  /* GAME SCREEN */
  #game-screen { display: none; }

  /* SCROLL WRAPPER */
  .table-scroll {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }

  /* SCOREBOARD TABLE */
  table {
    border-collapse: collapse;
    width: 100%;
    min-width: 320px;
  }

  thead th {
    background: var(--surface);
    padding: 10px 8px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1rem;
    letter-spacing: 1px;
    text-align: center;
    border-bottom: 2px solid var(--border);
    white-space: nowrap;
  }

  thead th:first-child {
    text-align: left;
    padding-left: 12px;
    min-width: 130px;
    background: var(--surface);
  }

  .player-header {
    min-width: 80px;
  }

  .player-name-display {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1rem;
    letter-spacing: 1px;
    display: block;
  }

  .player-total-display {
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    color: var(--muted);
    display: block;
    margin-top: 2px;
  }

  /* SECTION HEADERS */
  .section-row td {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 0.75rem;
    letter-spacing: 2px;
    color: var(--muted);
    padding: 8px 12px 4px;
    border-top: 1px solid var(--border);
    background: var(--bg);
  }

  /* SCORE ROW */
  .score-row td {
    border-bottom: 1px solid var(--border);
    padding: 0;
  }

  .score-row.upper { background: var(--upper); }
  .score-row.lower { background: var(--lower); }

  .row-label {
    padding: 10px 12px;
    font-size: 0.8rem;
    color: var(--text);
    white-space: nowrap;
  }

  .row-label .row-desc {
    font-size: 0.65rem;
    color: var(--muted);
    display: block;
    margin-top: 1px;
  }

  /* SCORE CELL */
  .score-cell {
    text-align: center;
    padding: 4px;
    position: relative;
  }

  .score-cell select,
  .score-cell input[type="number"] {
    width: 100%;
    max-width: 70px;
    background: transparent;
    border: 1.5px solid transparent;
    border-radius: 4px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 0.9rem;
    font-weight: 500;
    text-align: center;
    padding: 6px 2px;
    outline: none;
    transition: all 0.15s;
    cursor: pointer;
    appearance: none;
    -webkit-appearance: none;
    -moz-appearance: textfield;
  }

  .score-cell input[type="number"]::-webkit-outer-spin-button,
  .score-cell input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

  .score-cell select:focus,
  .score-cell input[type="number"]:focus {
    border-color: var(--accent);
    background: var(--surface2);
  }

  .score-cell select.filled,
  .score-cell input[type="number"].filled {
    color: var(--accent);
  }

  .score-cell select.zeroed,
  .score-cell input[type="number"].zeroed {
    color: var(--muted);
  }

  .score-cell select option {
    background: var(--surface2);
    color: var(--text);
  }

  /* SUBTOTAL / BONUS / TOTAL ROWS */
  .subtotal-row td, .total-row td {
    padding: 8px 12px;
    font-size: 0.8rem;
    border-top: 2px solid var(--border);
  }

  .subtotal-row { background: var(--surface2); }
  .total-row { background: var(--surface); border-bottom: 3px solid var(--accent2); }

  .subtotal-row .val, .total-row .val {
    text-align: center;
    font-weight: 500;
  }

  .total-row .val {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.2rem;
    color: var(--accent);
  }

  .bonus-indicator {
    font-size: 0.65rem;
    display: block;
  }

  .bonus-achieved { color: var(--green); }
  .bonus-pending { color: var(--muted); }

  /* WINNER BANNER */
  #winner-banner {
    display: none;
    background: linear-gradient(135deg, #f5c842 0%, #e8743a 100%);
    color: #000;
    text-align: center;
    padding: 16px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.6rem;
    letter-spacing: 2px;
  }

  /* DICE DECORATION */
  .dice-row {
    display: flex;
    justify-content: center;
    gap: 6px;
    padding: 14px 0 8px;
  }

  .die {
    width: 28px;
    height: 28px;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 5px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1rem;
  }

  /* FOOTER NOTE */
  .footer-note {
    text-align: center;
    color: var(--muted);
    font-size: 0.65rem;
    padding: 16px;
    letter-spacing: 0.5px;
  }

  /* PLAYER COLOR INDICATORS */
  .color-bar {
    height: 3px;
    width: 100%;
    border-radius: 2px;
    margin-top: 4px;
  }

  /* MODAL */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .modal-overlay.active { display: flex; }

  .modal {
    background: var(--surface);
    border: 2px solid var(--accent);
    border-radius: 8px;
    padding: 24px;
    max-width: 380px;
    width: 100%;
    text-align: center;
  }

  .modal h3 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.6rem;
    letter-spacing: 2px;
    color: var(--accent);
    margin-bottom: 8px;
  }

  .modal p { color: var(--muted); font-size: 0.8rem; margin-bottom: 20px; }

  .modal-btns { display: flex; gap: 10px; justify-content: center; }

</style>
</head>
<body>

<!-- SETUP SCREEN -->
<div id="setup-screen">
  <div class="dice-row">
    <div class="die">⚀</div>
    <div class="die">⚁</div>
    <div class="die">⚂</div>
    <div class="die">⚃</div>
    <div class="die">⚄</div>
  </div>
  <h2>NEW GAME — ADD PLAYERS</h2>
  <div id="player-inputs"></div>
  <div class="setup-actions">
    <button class="btn" onclick="addPlayerInput()">+ Add Player</button>
    <button class="btn primary" onclick="startGame()">Start Game ▶</button>
  </div>
</div>

<!-- GAME SCREEN -->
<div id="game-screen">
  <header>
    <div class="logo">Y<span>!</span>ahtzee</div>
    <div class="header-btns">
      <button class="btn" onclick="confirmReset()">New Game</button>
    </div>
  </header>

  <div id="winner-banner"></div>

  <div class="table-scroll">
    <table id="score-table">
      <thead>
        <tr id="player-header-row">
          <th>Category</th>
        </tr>
      </thead>
      <tbody id="score-body"></tbody>
    </table>
  </div>

  <p class="footer-note">TAP A CELL TO ENTER A SCORE · UPPER BONUS: 63+ = +35</p>
</div>

<!-- CONFIRM MODAL -->
<div class="modal-overlay" id="confirm-modal">
  <div class="modal">
    <h3>Reset Game?</h3>
    <p>All scores will be cleared and you'll return to player setup.</p>
    <div class="modal-btns">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn danger" onclick="resetGame()">Reset</button>
    </div>
  </div>
</div>

<script>
const PLAYER_COLORS = ['#f5c842','#e8743a','#4caf6e','#4a9ede','#c86dd7','#e84040'];

// Generate array [0, step, step*2, ... max]
function range(step, count) {
  return [null, ...Array.from({length: count}, (_, i) => step * (i + 1))];
}

// Dice sum options: any multiple of 1 from min to 30
function diceRange(min, max) {
  const opts = [null];
  for (let i = min; i <= max; i++) opts.push(i);
  return opts;
}

const UPPER_CATS = [
  { key:'ones',   label:'Ones',   desc:'Sum of all 1s', options: range(1, 5) },
  { key:'twos',   label:'Twos',   desc:'Sum of all 2s', options: range(2, 5) },
  { key:'threes', label:'Threes', desc:'Sum of all 3s', options: range(3, 5) },
  { key:'fours',  label:'Fours',  desc:'Sum of all 4s', options: range(4, 5) },
  { key:'fives',  label:'Fives',  desc:'Sum of all 5s', options: range(5, 5) },
  { key:'sixes',  label:'Sixes',  desc:'Sum of all 6s', options: range(6, 5) },
];

const LOWER_CATS = [
  { key:'three_kind',    label:'3 of a Kind',    desc:'Sum of all dice',   manual: true },
  { key:'four_kind',     label:'4 of a Kind',    desc:'Sum of all dice',   manual: true },
  { key:'full_house',    label:'Full House',     desc:'25 pts',            options: [null, 0, 25] },
  { key:'sm_straight',   label:'Sm. Straight',   desc:'30 pts',            options: [null, 0, 30] },
  { key:'lg_straight',   label:'Lg. Straight',   desc:'40 pts',            options: [null, 0, 40] },
  { key:'yahtzee',       label:'YAHTZEE!',       desc:'50 pts',            options: [null, 0, 50] },
  { key:'chance',        label:'Chance',         desc:'Sum of all dice',   manual: true },
  { key:'yahtzee_bonus', label:'Yahtzee Bonus',  desc:'100 pts each',      options: [null, 0, 100, 200, 300, 400, 500, 600, 700, 800, 900] },
];

let players = [];
let scores = {};

// ---- SETUP ----
function initSetup() {
  const container = document.getElementById('player-inputs');
  container.innerHTML = '';
  ['Player 1','Player 2'].forEach(name => addPlayerInput(name));
}

function addPlayerInput(defaultName = '') {
  const container = document.getElementById('player-inputs');
  const idx = container.children.length;
  if (idx >= 6) return;
  const color = PLAYER_COLORS[idx];
  const row = document.createElement('div');
  row.className = 'player-input-row';
  row.innerHTML = `
    <div class="player-color-dot" style="background:${color}"></div>
    <input type="text" placeholder="Player ${idx+1}" value="${defaultName}" maxlength="14">
    <button class="remove-player-btn" onclick="removePlayerInput(this)" title="Remove">✕</button>
  `;
  container.appendChild(row);
}

function removePlayerInput(btn) {
  const rows = document.querySelectorAll('.player-input-row');
  if (rows.length <= 1) return;
  btn.closest('.player-input-row').remove();
  // Recolor dots
  document.querySelectorAll('.player-color-dot').forEach((dot, i) => {
    dot.style.background = PLAYER_COLORS[i];
  });
}

function startGame() {
  const inputs = document.querySelectorAll('#player-inputs input[type="text"]');
  players = [];
  inputs.forEach((inp, i) => {
    const name = inp.value.trim() || `Player ${i+1}`;
    players.push({ name, color: PLAYER_COLORS[i] });
  });
  if (players.length < 1) return;

  // Init scores
  scores = {};
  players.forEach(p => {
    scores[p.name] = {};
    [...UPPER_CATS, ...LOWER_CATS].forEach(c => scores[p.name][c.key] = null);
  });

  document.getElementById('setup-screen').style.display = 'none';
  document.getElementById('game-screen').style.display = 'block';
  buildTable();
}

// ---- TABLE ----
function buildTable() {
  buildHeader();
  buildBody();
  updateTotals();
}

function buildHeader() {
  const row = document.getElementById('player-header-row');
  row.innerHTML = '<th>Category</th>';
  players.forEach(p => {
    const th = document.createElement('th');
    th.className = 'player-header';
    th.innerHTML = `
      <span class="player-name-display" style="color:${p.color}">${p.name}</span>
      <div class="color-bar" style="background:${p.color}"></div>
      <span class="player-total-display" id="total-display-${sanitize(p.name)}">0 pts</span>
    `;
    row.appendChild(th);
  });
}

function buildBody() {
  const tbody = document.getElementById('score-body');
  tbody.innerHTML = '';

  // UPPER SECTION
  const upperHead = document.createElement('tr');
  upperHead.className = 'section-row';
  upperHead.innerHTML = `<td colspan="${players.length+1}">UPPER SECTION</td>`;
  tbody.appendChild(upperHead);

  UPPER_CATS.forEach(cat => {
    const tr = document.createElement('tr');
    tr.className = 'score-row upper';
    tr.innerHTML = `<td class="row-label">${cat.label}<span class="row-desc">${cat.desc}</span></td>`;
    players.forEach(p => {
      const td = document.createElement('td');
      td.className = 'score-cell';
      const sel = buildSelect(cat.options, p.name, cat.key);
      td.appendChild(sel);
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });

  // Upper subtotal + bonus
  const subRow = document.createElement('tr');
  subRow.className = 'subtotal-row';
  subRow.innerHTML = `<td class="row-label">Upper Subtotal<span class="row-desc">Bonus at 63+</span></td>`;
  players.forEach(p => {
    const td = document.createElement('td');
    td.className = 'val';
    td.id = `upper-sub-${sanitize(p.name)}`;
    td.innerHTML = '0';
    subRow.appendChild(td);
  });
  tbody.appendChild(subRow);

  const bonusRow = document.createElement('tr');
  bonusRow.className = 'subtotal-row';
  bonusRow.innerHTML = `<td class="row-label">Bonus (+35)<span class="row-desc">Need 63 pts</span></td>`;
  players.forEach(p => {
    const td = document.createElement('td');
    td.className = 'val';
    td.id = `bonus-${sanitize(p.name)}`;
    td.innerHTML = '<span class="bonus-pending">0</span>';
    bonusRow.appendChild(td);
  });
  tbody.appendChild(bonusRow);

  // LOWER SECTION
  const lowerHead = document.createElement('tr');
  lowerHead.className = 'section-row';
  lowerHead.innerHTML = `<td colspan="${players.length+1}">LOWER SECTION</td>`;
  tbody.appendChild(lowerHead);

  LOWER_CATS.forEach(cat => {
    const tr = document.createElement('tr');
    tr.className = 'score-row lower';
    tr.innerHTML = `<td class="row-label">${cat.label}<span class="row-desc">${cat.desc}</span></td>`;
    players.forEach(p => {
      const td = document.createElement('td');
      td.className = 'score-cell';
      const el = cat.manual ? buildInput(p.name, cat.key) : buildSelect(cat.options, p.name, cat.key);
      td.appendChild(el);
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });

  // GRAND TOTAL
  const totalRow = document.createElement('tr');
  totalRow.className = 'total-row';
  totalRow.innerHTML = `<td class="row-label" style="font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:1px;color:var(--accent)">GRAND TOTAL</td>`;
  players.forEach(p => {
    const td = document.createElement('td');
    td.className = 'val';
    td.id = `grand-total-${sanitize(p.name)}`;
    td.innerHTML = '0';
    totalRow.appendChild(td);
  });
  tbody.appendChild(totalRow);
}

function buildInput(playerName, key) {
  const inp = document.createElement('input');
  inp.type = 'number';
  inp.min = 0;
  inp.max = 30;
  inp.placeholder = '—';
  inp.id = `score-${sanitize(playerName)}-${key}`;
  inp.addEventListener('change', () => saveScore(playerName, key, inp));
  return inp;
}

function buildSelect(options, playerName, key) {
  const sel = document.createElement('select');
  sel.id = `score-${sanitize(playerName)}-${key}`;

  options.forEach(val => {
    const opt = document.createElement('option');
    if (val === null) {
      opt.value = '';
      opt.textContent = '—';
    } else {
      opt.value = val;
      opt.textContent = val;
    }
    sel.appendChild(opt);
  });

  sel.addEventListener('change', () => saveScore(playerName, key, sel));
  return sel;
}

function saveScore(playerName, key, el) {
  const val = el.value;
  if (val === '' || val === null || isNaN(parseInt(val))) {
    scores[playerName][key] = null;
    el.classList.remove('filled', 'zeroed');
  } else {
    const num = parseInt(val);
    scores[playerName][key] = num;
    el.classList.toggle('filled', num > 0);
    el.classList.toggle('zeroed', num === 0);
  }
  updateTotals();
}

function updateTotals() {
  players.forEach(p => {
    const sn = sanitize(p.name);
    let upperSum = 0;
    UPPER_CATS.forEach(c => { if (scores[p.name][c.key] !== null) upperSum += scores[p.name][c.key]; });
    const bonus = upperSum >= 63 ? 35 : 0;

    let lowerSum = 0;
    LOWER_CATS.forEach(c => { if (scores[p.name][c.key] !== null) lowerSum += scores[p.name][c.key]; });

    const grand = upperSum + bonus + lowerSum;

    const subEl = document.getElementById(`upper-sub-${sn}`);
    if (subEl) subEl.textContent = upperSum;

    const bonusEl = document.getElementById(`bonus-${sn}`);
    if (bonusEl) {
      if (bonus === 35) {
        bonusEl.innerHTML = '<span class="bonus-achieved">+35 ✓</span>';
      } else {
        const needed = 63 - upperSum;
        bonusEl.innerHTML = `<span class="bonus-pending">${upperSum >= 63 ? '+35' : `need ${needed}`}</span>`;
      }
    }

    const gtEl = document.getElementById(`grand-total-${sn}`);
    if (gtEl) gtEl.textContent = grand;

    const totalDisplay = document.getElementById(`total-display-${sn}`);
    if (totalDisplay) totalDisplay.textContent = `${grand} pts`;
  });

  checkWinner();
}

function checkWinner() {
  // All cells filled?
  const allKeys = [...UPPER_CATS, ...LOWER_CATS].map(c => c.key);
  const allFilled = players.every(p => allKeys.every(k => scores[p.name][k] !== null));
  const banner = document.getElementById('winner-banner');
  if (!allFilled) { banner.style.display = 'none'; return; }

  let best = -1;
  let winners = [];
  players.forEach(p => {
    const sn = sanitize(p.name);
    const val = parseInt(document.getElementById(`grand-total-${sn}`).textContent) || 0;
    if (val > best) { best = val; winners = [p.name]; }
    else if (val === best) { winners.push(p.name); }
  });
  banner.style.display = 'block';
  if (winners.length === 1) {
    banner.textContent = `🎲 ${winners[0]} WINS WITH ${best} PTS! 🎲`;
  } else {
    banner.textContent = `🎲 TIE! ${winners.join(' & ')} — ${best} PTS EACH!`;
  }
}

function sanitize(name) {
  return name.replace(/[^a-zA-Z0-9]/g, '_');
}

// ---- MODAL ----
function confirmReset() {
  document.getElementById('confirm-modal').classList.add('active');
}

function closeModal() {
  document.getElementById('confirm-modal').classList.remove('active');
}

function resetGame() {
  closeModal();
  document.getElementById('game-screen').style.display = 'none';
  document.getElementById('setup-screen').style.display = 'block';
  document.getElementById('winner-banner').style.display = 'none';
  initSetup();
